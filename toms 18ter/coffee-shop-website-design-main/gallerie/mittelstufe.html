  <!-- Load library from the CDN -->
  <script src="https://unpkg.com/typed.js@2.0.16/dist/typed.umd.js"></script>

  <script>  
    var phrases = [
      'galeria de Lisboa',
      'galeria de Portugal',
      'website da JB',
      'website da João de Barros',
      'website estático',
      'uso de bibliotecas',
      'Javascript',
      'Futuro...'
    ];

    new Typed('#text-change', {
      strings: phrases,
      typeSpeed: 100,
      backSpeed: 100,
      backDelay: 1000,
      loop: true
    });

    document.querySelectorAll("#gallery-photos img").forEach(image => {
      image.onclick = () => {
        document.querySelector("#gallery").style.overflow = "hidden";
        document.querySelector("#image-popup").style.display = "block";
        document.querySelector("#image-popup img").src = image.getAttribute("src");
      }
    });

    document.querySelector("#image-popup span").onclick = () => {
      document.querySelector("#gallery").style.overflow = "auto";
      document.querySelector("#image-popup").style.display = "none";
    }

    document.querySelectorAll("#about-logo span").forEach((line, index) => {
      if (index === 0 || index === 1 || index === 2 || index === 3 ) {
        line.style.color = 'rgb(0,255,0,0.8)';
      }
      if (index === 4 || index === 5) {
        line.style.color = 'rgba(250, 250, 0, 0.8)';
      }
      if (index === 6 || index === 7 || index === 8 || index === 9 || index === 10) {
        line.style.color = 'rgba(255, 30, 30, 0.8)';
      }
      if (index === 11 || index === 12 ) {
        line.style.color = 'rgba(255, 30, 200, 0.8)';
      }
      if (index === 13 || index === 14 || index === 15 || index === 16 ) {
        line.style.color = 'rgba(150, 0, 255, 0.8)';
      }
    });
    
  </script>
